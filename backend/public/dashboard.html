<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Lean Convo</title>
  <link rel="stylesheet" href="/css/auth.css" />
  <style>
    body { align-items: flex-start; padding: 2rem; }
    .dashboard { max-width: 680px; margin: 0 auto; width: 100%; }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .topbar h1 { font-size: 1.4rem; color: #2b6cb0; font-weight: 700; }
    .topbar-actions { display: flex; gap: 0.75rem; align-items: center; }

    /* Buttons */
    .btn-sm { width: auto; padding: 0.5rem 1.25rem; display: inline-block; }
    .btn-outline {
      display: inline-block;
      width: auto;
      padding: 0.5rem 1.25rem;
      border: 1.5px solid #cbd5e0;
      border-radius: 7px;
      background: #fff;
      color: #4a5568;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline:hover { border-color: #2b6cb0; color: #2b6cb0; }

    /* Session list */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-header h2 { font-size: 1rem; font-weight: 700; color: #4a5568; text-transform: uppercase; letter-spacing: 0.05em; }

    .session-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .session-card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .session-card:hover { border-color: #bee3f8; box-shadow: 0 2px 8px rgba(43,108,176,0.08); }

    .session-card__info { flex: 1; min-width: 0; }
    .session-card__title { font-weight: 700; color: #1a202c; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-card__meta { font-size: 0.8rem; color: #718096; margin-top: 0.2rem; }
    .session-card__code {
      font-family: monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: #2b6cb0;
      background: #ebf8ff;
      padding: 0.2rem 0.6rem;
      border-radius: 5px;
      white-space: nowrap;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #a0aec0;
      background: #fff;
      border: 1.5px dashed #e2e8f0;
      border-radius: 10px;
    }
    .empty-state p { margin-top: 0.5rem; font-size: 0.9rem; }

    /* Loading spinner */
    .spinner { text-align: center; padding: 2rem; color: #a0aec0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="dashboard">

    <!-- Top bar -->
    <div class="topbar">
      <h1>Lean Convo</h1>
      <div class="topbar-actions">
        <span id="welcome-msg" style="font-size:0.875rem;color:#718096;"></span>
        <button class="btn-outline" id="logout-btn">Sign Out</button>
      </div>
    </div>

    <!-- Sessions section -->
    <div class="section-header">
      <h2>My Sessions</h2>
      <a href="/create-session.html" class="btn btn-primary btn-sm">+ New Session</a>
    </div>

    <div id="sessions-container">
      <div class="spinner" id="loading-msg">Loading sessions…</div>
    </div>

  </div>

  <script>
    const token = sessionStorage.getItem('accessToken');
    const displayName = sessionStorage.getItem('displayName');

    if (!token) {
      window.location.href = '/login.html';
    }

    if (displayName) {
      document.getElementById('welcome-msg').textContent = 'Hi, ' + displayName;
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = '/index.html';
    });

    async function loadSessions() {
      const container = document.getElementById('sessions-container');
      try {
        const res = await fetch('/sessions/my-sessions', {
          headers: { 'Authorization': 'Bearer ' + token },
        });

        const body = await res.json();

        if (!res.ok || !body.success) {
          container.innerHTML = '<div class="empty-state"><strong>Could not load sessions.</strong><p>' + (body.errorMessage || 'Please try again.') + '</p></div>';
          return;
        }

        const sessions = body.data;
        if (!sessions || sessions.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <strong>No sessions yet</strong>
              <p>Create your first Lean Coffee session to get started.</p>
            </div>`;
          return;
        }

        const list = document.createElement('div');
        list.className = 'session-list';

        sessions.forEach((session) => {
          const card = document.createElement('div');
          card.className = 'session-card';

          const createdDate = session.createdAt
            ? new Date(session.createdAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
            : '';

          card.innerHTML = `
            <div class="session-card__info">
              <div class="session-card__title">${escapeHtml(session.title)}</div>
              <div class="session-card__meta">${createdDate}${session.description ? ' · ' + escapeHtml(session.description.substring(0, 60)) + (session.description.length > 60 ? '…' : '') : ''}</div>
            </div>
            <span class="session-card__code" title="Join code">${escapeHtml(session.joinCode)}</span>
          `;

          list.appendChild(card);
        });

        container.innerHTML = '';
        container.appendChild(list);
      } catch {
        container.innerHTML = '<div class="empty-state"><strong>Network error</strong><p>Could not reach the server. Please refresh.</p></div>';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str || ''));
      return div.innerHTML;
    }

    loadSessions();
  </script>
</body>
</html>
