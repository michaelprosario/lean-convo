<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Session – Lean Convo</title>
  <link rel="stylesheet" href="/css/auth.css" />
  <style>
    body { align-items: flex-start; padding: 2rem; background: #f0f4f8; }
    .page { max-width: 960px; width: 100%; margin: 0 auto; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .top h1 { font-size: 1.35rem; color: #2b6cb0; }
    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #4a5568;
      margin-bottom: 0.8rem;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-size: 0.8rem; color: #718096; font-weight: 600; }
    .field input, .field textarea, .field select {
      width: 100%;
      border: 1.5px solid #cbd5e0;
      border-radius: 7px;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
    }
    .field textarea { min-height: 70px; resize: vertical; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: #3182ce; }

    .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

    .btn {
      width: auto;
      border: none;
      border-radius: 7px;
      padding: 0.55rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: #2b6cb0;
      color: #fff;
    }
    .btn:hover { background: #2c5282; }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .btn-outline {
      width: auto;
      border: 1.5px solid #cbd5e0;
      border-radius: 7px;
      padding: 0.5rem 0.8rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #4a5568;
    }
    .btn-outline:hover { border-color: #2b6cb0; color: #2b6cb0; }

    .msg { font-size: 0.82rem; margin-top: 0.4rem; }
    .msg.err { color: #e53e3e; }
    .msg.ok { color: #2f855a; }

    .topic-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .topic-item {
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      padding: 0.8rem;
      background: #fafcff;
    }
    .topic-meta {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      font-size: 0.78rem;
      color: #718096;
      margin-bottom: 0.5rem;
    }
    .status-pill {
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
    }
    .status-Todo { background: #edf2f7; color: #718096; }
    .status-Active { background: #c6f6d5; color: #276749; }
    .status-Done { background: #e2e8f0; color: #4a5568; }

    .empty {
      border: 1.5px dashed #e2e8f0;
      border-radius: 10px;
      padding: 1.2rem;
      color: #a0aec0;
      text-align: center;
      background: #fff;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <h1 id="page-title">Organizer Session</h1>
      <div class="toolbar">
        <a class="btn-outline" href="/dashboard.html">Back to Dashboard</a>
        <button class="btn-outline" id="refresh-btn" type="button">Refresh</button>
      </div>
    </div>

    <section class="card">
      <div class="section-title">Session Details</div>
      <div class="grid">
        <div class="field">
          <label for="session-title">Title</label>
          <input id="session-title" type="text" maxlength="120" />
        </div>
        <div class="field">
          <label for="session-votes">Max Upvotes Per Participant</label>
          <input id="session-votes" type="number" min="1" max="100" />
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label for="session-description">Description</label>
          <textarea id="session-description"></textarea>
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label for="session-video">Video Link</label>
          <input id="session-video" type="url" placeholder="https://..." />
        </div>
      </div>
      <div class="row" style="margin-top:0.7rem;">
        <button class="btn" id="save-session-btn" type="button">Save Session</button>
        <button class="btn-outline" id="export-json-btn" type="button">Export JSON</button>
        <button class="btn-outline" id="export-csv-btn" type="button">Export CSV</button>
      </div>
      <div class="msg" id="session-msg"></div>
    </section>

    <section class="card">
      <div class="section-title">Topics</div>
      <div id="topics-container" class="empty">Loading topics...</div>
    </section>
  </div>

  <script>
    const token = sessionStorage.getItem('accessToken');
    if (!token) {
      window.location.href = '/login.html';
    }

    const sessionId = new URLSearchParams(window.location.search).get('sessionId');
    if (!sessionId) {
      window.location.href = '/dashboard.html';
    }

    const titleEl = document.getElementById('session-title');
    const descEl = document.getElementById('session-description');
    const votesEl = document.getElementById('session-votes');
    const videoEl = document.getElementById('session-video');
    const msgEl = document.getElementById('session-msg');
    const topicsContainer = document.getElementById('topics-container');

    let activeSession = null;

    function showMessage(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + (type || '');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str || ''));
      return div.innerHTML;
    }

    async function fetchMySessions() {
      const res = await fetch('/sessions/my-sessions', {
        headers: { Authorization: 'Bearer ' + token },
      });
      const body = await res.json();
      if (!res.ok || !body.success) {
        throw new Error(body.errorMessage || 'Could not load sessions.');
      }
      return body.data || [];
    }

    async function loadSession() {
      try {
        const sessions = await fetchMySessions();
        activeSession = sessions.find((s) => s.id === sessionId) || null;
        if (!activeSession) {
          showMessage('Session not found for your account.', 'err');
          return;
        }

        document.getElementById('page-title').textContent = 'Organizer Session: ' + activeSession.title;
        titleEl.value = activeSession.title || '';
        descEl.value = activeSession.description || '';
        votesEl.value = String(activeSession.maxUpvotesPerParticipant || 1);
        videoEl.value = activeSession.videoLink || '';
      } catch (err) {
        showMessage(err.message || 'Could not load session.', 'err');
      }
    }

    async function saveSession() {
      if (!activeSession) {
        showMessage('Session is not loaded yet.', 'err');
        return;
      }

      const title = titleEl.value.trim();
      const description = descEl.value.trim();
      const maxUpvotesPerParticipant = parseInt(votesEl.value, 10);
      const videoLink = videoEl.value.trim();

      if (!title) {
        showMessage('Title is required.', 'err');
        return;
      }

      if (Number.isNaN(maxUpvotesPerParticipant) || maxUpvotesPerParticipant < 1) {
        showMessage('Max upvotes must be at least 1.', 'err');
        return;
      }

      const payload = {
        sessionId,
        title,
        description,
        maxUpvotesPerParticipant,
      };

      if (videoLink) {
        payload.videoLink = videoLink;
      }

      const saveBtn = document.getElementById('save-session-btn');
      saveBtn.disabled = true;

      try {
        const res = await fetch('/sessions/edit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify(payload),
        });

        const body = await res.json();
        if (!res.ok || !body.success) {
          throw new Error(body.errorMessage || 'Could not save session.');
        }

        activeSession = body.data;
        showMessage('Session updated.', 'ok');
        await loadTopics();
      } catch (err) {
        showMessage(err.message || 'Could not save session.', 'err');
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function loadTopics() {
      topicsContainer.innerHTML = '<div class="empty">Loading topics...</div>';
      try {
        const res = await fetch('/topics/by-session/' + encodeURIComponent(sessionId));
        const body = await res.json();

        if (!res.ok || !body.success) {
          throw new Error(body.errorMessage || 'Could not load topics.');
        }

        const topics = body.data || [];
        if (!topics.length) {
          topicsContainer.innerHTML = '<div class="empty">No topics in this session yet.</div>';
          return;
        }

        const list = document.createElement('div');
        list.className = 'topic-list';

        topics.forEach((topic) => {
          const item = document.createElement('div');
          item.className = 'topic-item';
          item.innerHTML = `
            <div class="topic-meta">
              <span><strong>Votes:</strong> ${topic.upvoteCount}</span>
              <span><strong>Proposed By:</strong> ${escapeHtml(topic.proposedBy)}</span>
              <span class="status-pill status-${escapeHtml(topic.status)}">${escapeHtml(topic.status)}</span>
            </div>
            <div class="grid">
              <div class="field" style="grid-column: 1 / -1;">
                <label>Title</label>
                <input type="text" data-topic-title="${topic.id}" value="${escapeHtml(topic.title)}" maxlength="120" />
              </div>
              <div class="field" style="grid-column: 1 / -1;">
                <label>Description</label>
                <textarea data-topic-description="${topic.id}">${escapeHtml(topic.description || '')}</textarea>
              </div>
              <div class="field">
                <label>Status</label>
                <select data-topic-status="${topic.id}">
                  <option value="Todo" ${topic.status === 'Todo' ? 'selected' : ''}>Todo</option>
                  <option value="Active" ${topic.status === 'Active' ? 'selected' : ''}>Active</option>
                  <option value="Done" ${topic.status === 'Done' ? 'selected' : ''}>Done</option>
                </select>
              </div>
            </div>
            <div class="row" style="margin-top:0.6rem;">
              <button type="button" class="btn" data-topic-save="${topic.id}">Save Topic</button>
              <button type="button" class="btn-outline" data-topic-status-save="${topic.id}">Update Status</button>
            </div>
            <div class="msg" data-topic-msg="${topic.id}"></div>
          `;

          list.appendChild(item);
        });

        topicsContainer.innerHTML = '';
        topicsContainer.appendChild(list);
        bindTopicActions();
      } catch (err) {
        topicsContainer.innerHTML = '<div class="empty">' + escapeHtml(err.message || 'Could not load topics.') + '</div>';
      }
    }

    function topicMessage(topicId, text, type) {
      const el = document.querySelector('[data-topic-msg="' + topicId + '"]');
      if (!el) return;
      el.textContent = text;
      el.className = 'msg ' + (type || '');
    }

    async function updateTopic(topicId) {
      const titleInput = document.querySelector('[data-topic-title="' + topicId + '"]');
      const descInput = document.querySelector('[data-topic-description="' + topicId + '"]');
      const title = titleInput.value.trim();
      const description = descInput.value.trim();

      if (!title) {
        topicMessage(topicId, 'Title is required.', 'err');
        return;
      }

      try {
        const res = await fetch('/topics/organizer/edit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify({ topicId, title, description }),
        });

        const body = await res.json();
        if (!res.ok || !body.success) {
          throw new Error(body.errorMessage || 'Could not update topic.');
        }

        topicMessage(topicId, 'Topic updated.', 'ok');
        await loadTopics();
      } catch (err) {
        topicMessage(topicId, err.message || 'Could not update topic.', 'err');
      }
    }

    async function updateTopicStatus(topicId) {
      const statusSelect = document.querySelector('[data-topic-status="' + topicId + '"]');
      const status = statusSelect.value;

      try {
        const res = await fetch('/topics/organizer/set-status', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify({ topicId, status }),
        });

        const body = await res.json();
        if (!res.ok || !body.success) {
          throw new Error(body.errorMessage || 'Could not update status.');
        }

        topicMessage(topicId, 'Status updated.', 'ok');
        await loadTopics();
      } catch (err) {
        topicMessage(topicId, err.message || 'Could not update status.', 'err');
      }
    }

    function bindTopicActions() {
      document.querySelectorAll('[data-topic-save]').forEach((btn) => {
        btn.addEventListener('click', () => updateTopic(btn.getAttribute('data-topic-save')));
      });

      document.querySelectorAll('[data-topic-status-save]').forEach((btn) => {
        btn.addEventListener('click', () => updateTopicStatus(btn.getAttribute('data-topic-status-save')));
      });
    }

    function toCsv(exportData) {
      const header = [
        'sessionId',
        'sessionTitle',
        'joinCode',
        'topicId',
        'topicTitle',
        'topicDescription',
        'topicStatus',
        'upvoteCount',
        'proposedBy',
        'createdAt',
      ];

      const rows = (exportData.topics || []).map((topic) => [
        exportData.session.id,
        exportData.session.title,
        exportData.session.joinCode,
        topic.id,
        topic.title,
        topic.description || '',
        topic.status,
        String(topic.upvoteCount),
        topic.proposedBy,
        String(topic.createdAt),
      ]);

      const all = [header, ...rows];
      return all
        .map((row) => row.map(csvCell).join(','))
        .join('\n');
    }

    function csvCell(value) {
      const raw = String(value ?? '');
      const escaped = raw.replace(/"/g, '""');
      return '"' + escaped + '"';
    }

    function downloadText(filename, text, mimeType) {
      const blob = new Blob([text], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function fetchExportData() {
      const res = await fetch('/sessions/' + encodeURIComponent(sessionId) + '/export', {
        headers: { Authorization: 'Bearer ' + token },
      });
      const body = await res.json();
      if (!res.ok || !body.success) {
        throw new Error(body.errorMessage || 'Could not export session.');
      }
      return body.data;
    }

    async function exportJson() {
      try {
        const data = await fetchExportData();
        const stamp = new Date().toISOString().replace(/[:.]/g, '-');
        downloadText('session-export-' + stamp + '.json', JSON.stringify(data, null, 2), 'application/json');
        showMessage('JSON export generated.', 'ok');
      } catch (err) {
        showMessage(err.message || 'Export failed.', 'err');
      }
    }

    async function exportCsv() {
      try {
        const data = await fetchExportData();
        const csv = toCsv(data);
        const stamp = new Date().toISOString().replace(/[:.]/g, '-');
        downloadText('session-export-' + stamp + '.csv', csv, 'text/csv');
        showMessage('CSV export generated.', 'ok');
      } catch (err) {
        showMessage(err.message || 'Export failed.', 'err');
      }
    }

    document.getElementById('save-session-btn').addEventListener('click', saveSession);
    document.getElementById('refresh-btn').addEventListener('click', async () => {
      showMessage('', '');
      await loadSession();
      await loadTopics();
    });
    document.getElementById('export-json-btn').addEventListener('click', exportJson);
    document.getElementById('export-csv-btn').addEventListener('click', exportCsv);

    (async function init() {
      await loadSession();
      await loadTopics();
    })();
  </script>
</body>
</html>
