<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lean Convo – Run Better Conversations</title>
  <link rel="stylesheet" href="/css/auth.css" />
  <style>
    /* ===== Splash layout overrides ===== */
    body {
      background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 60%, #63b3ed 100%);
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .splash {
      max-width: 480px;
      width: 100%;
      text-align: center;
      color: #fff;
    }

    /* Logo / hero */
    .splash__logo {
      margin-bottom: 2rem;
    }

    .splash__logo .app-name {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      line-height: 1.1;
    }

    .splash__logo .app-tagline {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.82);
      margin-top: 0.5rem;
    }

    /* Feature bullets */
    .splash__features {
      list-style: none;
      margin: 1.5rem 0 2rem;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .splash__features li {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .splash__features li::before {
      content: "✓";
      font-weight: 700;
      color: #90cdf4;
      font-size: 1rem;
    }

    /* CTA card */
    .splash__card {
      background: #fff;
      border-radius: 14px;
      padding: 2rem 1.75rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .splash__card h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 1.25rem;
    }

    .splash__actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #2b6cb0;
      color: #2b6cb0;
      display: block;
      width: 100%;
      padding: 0.75rem;
      border-radius: 7px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      text-align: center;
    }

    .btn-outline:hover {
      background: #2b6cb0;
      color: #fff;
    }

    .splash__card .divider {
      text-align: center;
      font-size: 0.8rem;
      color: #a0aec0;
      margin: 0.25rem 0;
    }

    /* Footer note */
    .splash__footer {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="splash">
    <!-- Hero -->
    <div class="splash__logo">
      <div class="app-name">Lean Convo</div>
      <p class="app-tagline">Facilitate lean, focused conversations with structured sessions.</p>
    </div>

    <!-- Feature highlights -->
    <ul class="splash__features">
      <li>Create and manage conversation sessions</li>
      <li>Invite participants and track outcomes</li>
      <li>Keep meetings lean and on-topic</li>
    </ul>

    <!-- CTA card -->
    <div class="splash__card">
      <h2>Get started today</h2>
      <div class="splash__actions">
        <a href="/register.html" class="btn btn-primary" style="text-decoration:none;text-align:center;">
          Create an Account
        </a>
        <div class="divider">or</div>
        <a href="/login.html" class="btn-outline">
          Sign In
        </a>
      </div>
    </div>

    <p class="splash__footer">Already have an account? <a href="/login.html" style="color:rgba(255,255,255,0.85);">Sign in here.</a></p>
  </div>

  <script>
    // If the user is already authenticated, skip the splash and go straight to the dashboard.
    if (sessionStorage.getItem('accessToken')) {
      window.location.replace('/dashboard.html');
    }
  </script>
</body>
</html>
