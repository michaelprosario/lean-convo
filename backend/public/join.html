<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Session – Lean Convo</title>
  <link rel="stylesheet" href="/css/auth.css" />
  <style>
    .hint { font-size: 0.78rem; color: #a0aec0; margin-top: 0.25rem; }
    .code-input {
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: #a0aec0;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__logo">
      <h1>Lean Convo</h1>
      <p>Join a session</p>
    </div>

    <div id="alert-error" class="alert alert-error" role="alert"></div>

    <form id="join-form" novalidate>
      <div class="form-group">
        <label for="joinCode">Session Code <span style="color:#e53e3e">*</span></label>
        <input
          type="text"
          id="joinCode"
          name="joinCode"
          class="code-input"
          placeholder="e.g. A1B2C3"
          maxlength="8"
          required
          autocomplete="off"
        />
        <p class="hint">The 6-character code shared by the organizer.</p>
      </div>

      <div class="form-group">
        <label for="name">Your Display Name <span style="color:#e53e3e">*</span></label>
        <input type="text" id="name" name="name" placeholder="e.g. Jane Smith" required />
      </div>

      <div class="form-group">
        <label for="linkedInUrl">LinkedIn Profile <span style="color:#a0aec0;font-weight:400">(optional)</span></label>
        <input type="url" id="linkedInUrl" name="linkedInUrl" placeholder="https://linkedin.com/in/..." />
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn">Join Session</button>
    </form>

    <div class="divider">or</div>
    <p style="text-align:center;font-size:0.85rem;color:#718096;">
      Are you an organizer? <a href="/login.html" style="color:#2b6cb0;font-weight:600;">Sign in</a>
    </p>
  </div>

  <script>
    const form = document.getElementById('join-form');
    const submitBtn = document.getElementById('submit-btn');
    const alertError = document.getElementById('alert-error');

    // Pre-fill join code from query string: /join.html?code=ABC123
    const params = new URLSearchParams(window.location.search);
    const codeParam = params.get('code');
    if (codeParam) {
      document.getElementById('joinCode').value = codeParam.toUpperCase();
    }

    function showError(msg) {
      alertError.textContent = msg;
      alertError.style.display = 'block';
    }

    function clearError() {
      alertError.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const joinCode = document.getElementById('joinCode').value.trim().toUpperCase();
      const name = document.getElementById('name').value.trim();
      const linkedInUrl = document.getElementById('linkedInUrl').value.trim();

      if (!joinCode) {
        showError('Session code is required.');
        return;
      }

      if (!name) {
        showError('Display name is required.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Joining…';

      try {
        // Step 1: resolve session by code
        const sessionRes = await fetch('/sessions/by-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ joinCode }),
        });
        const sessionBody = await sessionRes.json();

        if (!sessionRes.ok || !sessionBody.success) {
          showError(sessionBody.errorMessage || 'Session not found. Please check the code.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join Session';
          return;
        }

        const session = sessionBody.data;

        // Step 2: join session (create participant record)
        const payload = { joinCode, name };
        if (linkedInUrl) payload.linkedInUrl = linkedInUrl;

        const joinRes = await fetch('/participants/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const joinBody = await joinRes.json();

        if (!joinRes.ok || !joinBody.success) {
          showError(joinBody.errorMessage || 'Could not join session. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join Session';
          return;
        }

        const participant = joinBody.data;

        // Store context in sessionStorage then navigate
        sessionStorage.setItem('participantId', participant.id);
        sessionStorage.setItem('participantName', participant.name);
        sessionStorage.setItem('sessionId', session.id);
        sessionStorage.setItem('sessionTitle', session.title);
        sessionStorage.setItem('sessionDescription', session.description || '');
        sessionStorage.setItem('sessionVideoLink', session.videoLink || '');
        sessionStorage.setItem('maxUpvotes', String(session.maxUpvotesPerParticipant));

        window.location.href = '/session.html';
      } catch {
        showError('Network error. Please check your connection and try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join Session';
      }
    });

    // Auto-uppercase the code field
    document.getElementById('joinCode').addEventListener('input', function () {
      this.value = this.value.toUpperCase();
    });
  </script>
</body>
</html>
