<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Session – Lean Convo</title>
  <link rel="stylesheet" href="/css/auth.css" />
  <style>
    body { align-items: flex-start; padding: 2rem; }
    .container { max-width: 520px; margin: 0 auto; width: 100%; }
    .back-link { display: inline-block; margin-bottom: 1rem; color: #718096; font-size: 0.875rem; text-decoration: none; }
    .back-link:hover { color: #2b6cb0; }
    textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #cbd5e0;
      border-radius: 7px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }
    .hint { font-size: 0.78rem; color: #a0aec0; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/dashboard.html" class="back-link">← Back to dashboard</a>
    <div class="card" style="max-width:100%;">
      <div class="card__logo">
        <h1>Lean Convo</h1>
        <p>Create a new session</p>
      </div>

      <div id="alert-error" class="alert alert-error" role="alert"></div>
      <div id="alert-success" class="alert alert-success" role="alert"></div>

      <form id="create-session-form" novalidate>
        <div class="form-group">
          <label for="title">Session Title <span style="color:#e53e3e">*</span></label>
          <input type="text" id="title" name="title" placeholder="e.g. Team Retrospective Q3" required />
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" placeholder="Optional – describe the purpose of this session"></textarea>
        </div>

        <div class="form-group">
          <label for="videoLink">Video Call Link</label>
          <input type="url" id="videoLink" name="videoLink" placeholder="https://zoom.us/j/..." />
          <p class="hint">Zoom, Teams, Meet, etc. Shared with participants.</p>
        </div>

        <div class="form-group">
          <label for="maxUpvotesPerParticipant">Max Up-votes per Participant <span style="color:#e53e3e">*</span></label>
          <input type="number" id="maxUpvotesPerParticipant" name="maxUpvotesPerParticipant" value="3" min="1" max="20" required />
          <p class="hint">How many topics each participant may vote for.</p>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Create Session</button>
      </form>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem('accessToken');
    if (!token) {
      window.location.href = '/login.html';
    }

    const form = document.getElementById('create-session-form');
    const submitBtn = document.getElementById('submit-btn');
    const alertError = document.getElementById('alert-error');
    const alertSuccess = document.getElementById('alert-success');

    function showError(msg) {
      alertError.textContent = msg;
      alertError.style.display = 'block';
      alertSuccess.style.display = 'none';
    }

    function showSuccess(msg) {
      alertSuccess.textContent = msg;
      alertSuccess.style.display = 'block';
      alertError.style.display = 'none';
    }

    function clearAlerts() {
      alertError.style.display = 'none';
      alertSuccess.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();

      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const videoLink = document.getElementById('videoLink').value.trim();
      const maxUpvotesPerParticipant = parseInt(document.getElementById('maxUpvotesPerParticipant').value, 10);

      if (!title) {
        showError('Session title is required.');
        return;
      }

      if (isNaN(maxUpvotesPerParticipant) || maxUpvotesPerParticipant < 1) {
        showError('Max up-votes per participant must be at least 1.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating…';

      const payload = { title, description, maxUpvotesPerParticipant };
      if (videoLink) payload.videoLink = videoLink;

      try {
        const res = await fetch('/sessions/create', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
          },
          body: JSON.stringify(payload),
        });

        const body = await res.json();

        if (res.ok && body.success) {
          const session = body.data;
          showSuccess('Session created! Join code: ' + session.joinCode);
          // Redirect to dashboard after a brief pause so the user sees the code
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 2500);
        } else {
          showError(body.errorMessage || body.message || 'Failed to create session.');
        }
      } catch {
        showError('Network error. Please check your connection and try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Session';
      }
    });
  </script>
</body>
</html>
